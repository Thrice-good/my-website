<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .clock {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .date {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        
        .greeting {
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.8);
        }
        
        /* Search Bar */
        .search-wrapper {
            max-width: 600px;
            margin: 0 auto 60px;
        }
        
        .search-box {
            display: flex;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 4px;
            transition: all 0.3s;
        }
        
        .search-box:focus-within {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            padding: 16px 20px;
            font-size: 1rem;
            color: #fff;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .search-box button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(102,126,234,0.4);
        }
        
        /* Apps Grid */
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 24px;
            padding-left: 8px;
        }
        
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .app-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        
        .app-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        
        .app-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 16px;
        }
        
        .app-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .app-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }
        
        /* Icon Colors */
        .icon-todo { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .icon-tools { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .icon-games { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .icon-notes { background: linear-gradient(135deg, #fa709a, #fee140); }
        .icon-weather { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .icon-music { background: linear-gradient(135deg, #667eea, #764ba2); }
        .icon-calculator { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .icon-links { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .icon-placeholder { background: rgba(255,255,255,0.15); border: 2px dashed rgba(255,255,255,0.2); }
        
        /* Add App Button */
        .app-card.add-new {
            border-style: dashed;
            border-color: rgba(255,255,255,0.2);
            background: transparent;
        }
        
        .app-card.add-new:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.3);
        }
        
        .app-card.add-new .app-icon {
            font-size: 2rem;
            color: rgba(255,255,255,0.3);
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
        
        .footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
        
        .footer a:hover {
            color: #fff;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .clock { font-size: 2.5rem; }
            .greeting { font-size: 1.3rem; }
            .apps-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .app-card { padding: 20px 12px; }
            .app-icon { width: 44px; height: 44px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="date" id="date">加载中...</div>
            <div class="greeting" id="greeting">你好</div>
        </header>
        
        <div class="search-wrapper">
            <form class="search-box" id="searchForm" onsubmit="handleSearch(event)">
                <input type="text" id="searchInput" placeholder="搜索任何内容..." autocomplete="off">
                <button type="submit">搜索</button>
            </form>
        </div>
        
        <section>
            <div class="section-title">我的应用</div>
            <div class="apps-grid">
                <!-- 已有应用 -->
                <a href="apps/todo/" class="app-card">
                    <div class="app-icon icon-todo">📝</div>
                    <div class="app-name">待办清单</div>
                    <div class="app-desc">管理日常任务</div>
                </a>
                
                <a href="apps/calculator/" class="app-card">
                    <div class="app-icon icon-calculator">🧮</div>
                    <div class="app-name">计算器</div>
                    <div class="app-desc">简单计算</div>
                </a>
                
                <a href="apps/notes/" class="app-card">
                    <div class="app-icon icon-notes">📓</div>
                    <div class="app-name">笔记本</div>
                    <div class="app-desc">快速记录</div>
                </a>
                
                <a href="apps/weather/" class="app-card">
                    <div class="app-icon icon-weather">🌤️</div>
                    <div class="app-name">天气</div>
                    <div class="app-desc">查看天气</div>
                </a>
                
                <a href="apps/links/" class="app-card">
                    <div class="app-icon icon-links">🔗</div>
                    <div class="app-name">常用链接</div>
                    <div class="app-desc">快捷入口</div>
                </a>
                
                <a href="apps/tools/index.html" class="app-card">
                    <div class="app-icon icon-tools">🛠️</div>
                    <div class="app-name">工具箱</div>
                    <div class="app-desc">小工具集合</div>
                </a>
                
                <!-- 占位 - 可扩展 -->
                <a href="#" class="app-card add-new" onclick="return false;">
                    <div class="app-icon icon-placeholder">+</div>
                    <div class="app-name">添加应用</div>
                    <div class="app-desc">敬请期待</div>
                </a>
            </div>
        </section>
        
        <footer class="footer">
            <p>托管于 <a href="https://github.com/Thrice-good/my-website" target="_blank">GitHub Pages</a> · 由 QClaw 构建</p>
        </footer>
    </div>
    
    <script>
        // 时钟
        function updateClock() {
            const now = new Date();
            const clock = document.getElementById('clock');
            const date = document.getElementById('date');
            const greeting = document.getElementById('greeting');
            
            // 时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            clock.textContent = `${hours}:${minutes}`;
            
            // 日期
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = weekdays[now.getDay()];
            date.textContent = `${month}月${day}日 ${weekday}`;
            
            // 问候语
            const hour = now.getHours();
            let text = '你好';
            if (hour >= 5 && hour < 9) text = '早上好';
            else if (hour >= 9 && hour < 12) text = '上午好';
            else if (hour >= 12 && hour < 14) text = '中午好';
            else if (hour >= 14 && hour < 18) text = '下午好';
            else if (hour >= 18 && hour < 22) text = '晚上好';
            else text = '夜深了';
            
            greeting.textContent = text;
        }
        
        updateClock();
        setInterval(updateClock, 1000);
        
        // 搜索
        function handleSearch(e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }
        
        // 键盘快捷键 - / 聚焦搜索
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
