<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #2d1b4e 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe, #00f2fe);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 4s ease infinite;
            margin-bottom: 1rem;
        }
        p {
            color: rgba(255,255,255,0.7);
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 42px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(240,147,251,0.3);
        }
        /* floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }
        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        @keyframes gradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <h1>Hello World 🚀</h1>
        <p>由 QClaw 部署于 GitHub Pages</p>
        <a class="btn" href="https://github.com" target="_blank">Visit GitHub</a>
    </div>
    <script>
        const container = document.getElementById('particles');
        const colors = ['#f093fb','#f5576c','#4facfe','#00f2fe','#43e97b'];
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 6 + 2;
            const color = colors[Math.floor(Math.random() * colors.length)];
            p.style.cssText = `
                width:${size}px;height:${size}px;
                left:${Math.random()*100}%;
                background:${color};
                animation-duration:${Math.random()*8+6}s;
                animation-delay:${Math.random()*8}s;
            `;
            container.appendChild(p);
        }
    </script>
</body>
</html>
